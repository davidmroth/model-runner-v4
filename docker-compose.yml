# model-runner-v4 — Lucebox Hub inference engine (internal :8080 only)
#
# Client traffic goes through ai-platform proxy on :8000.
# Native vision: build dflash_server with -DDFLASH27B_MMPROJ=ON, set DFLASH_MMPROJ.
#
#   docker network create ai-inference   # once (shared with ai-platform)
#   docker compose --profile download run --rm download
#   docker compose --profile serve up -d

services:
  download:
    profiles: ["download"]
    image: python:3.12-slim
    container_name: model-runner-v4-download
    restart: "no"
    environment:
      HF_TOKEN: ${HF_TOKEN:-}
      HUGGING_FACE_HUB_TOKEN: ${HF_TOKEN:-}
    volumes:
      - ${MODEL_DIR:-../models-cache}:/models
      - ./scripts/download-models.sh:/download-models.sh:ro
    command: ["bash", "/download-models.sh"]

  lucebox:
    profiles: ["serve"]
    image: ${LUCEBOX_IMAGE:-ghcr.io/luce-org/lucebox-hub:cuda12}
    container_name: model-runner-v4-lucebox
    restart: ${RESTART:-unless-stopped}
    entrypoint: ["/bin/bash", "/scripts/entrypoint-dual-gpu.sh"]
    expose:
      - "8080"
    volumes:
      - ${MODEL_DIR:-../models-cache}:/opt/lucebox-hub/server/models
      - ${LUCEBOX_HUB_SRC:-../lucebox-hub-src}/server/scripts/entrypoint.sh:/opt/lucebox-hub/server/scripts/entrypoint.sh:ro
      - ./scripts/entrypoint-dual-gpu.sh:/scripts/entrypoint-dual-gpu.sh:ro
      - ./scripts/entrypoint-tool-split-serve.sh:/scripts/entrypoint-tool-split-serve.sh:ro
      - ${LUCEBOX_PATCH_DIR:-../lucebox-hub-patch/dflash/scripts}:/opt/lucebox-hub/patch/dflash/scripts:ro
      - ${LUCEBOX_DFLASH_BUILD:-../lucebox-hub-src/server/build-mmproj}:/opt/lucebox-hub/dflash-build:ro
    environment:
      DFLASH_MMPROJ: ${DFLASH_MMPROJ:-/opt/lucebox-hub/server/models/qwen3.6-27b-gguf/mmproj-F16.gguf}
      DFLASH_MMPROJ_NO_OFFLOAD: ${DFLASH_MMPROJ_NO_OFFLOAD:-1}
      DFLASH_MMPROJ_THREADS: ${DFLASH_MMPROJ_THREADS:-4}
      IMAGE_MIN_TOKENS: ${IMAGE_MIN_TOKENS:-256}
      IMAGE_MAX_TOKENS: ${IMAGE_MAX_TOKENS:-1024}
      DFLASH_SERVER_BIN: ${DFLASH_SERVER_BIN:-/opt/lucebox-hub/dflash-build/dflash_server}
      DFLASH_DAEMON_BIN: ${DFLASH_DAEMON_BIN:-/opt/lucebox-hub/dflash-build/test_dflash}
      DFLASH_TARGET: ${DFLASH_TARGET:-/opt/lucebox-hub/server/models/qwen3.6-27b-gguf/unsloth-q4km/Qwen3.6-27B-Q4_K_M.gguf}
      DFLASH_DRAFT: ${DFLASH_DRAFT:-/opt/lucebox-hub/server/models/qwen3.6-27b-gguf/dflash-lucebox/dflash-draft-3.6-q4_k_m.gguf}
      DFLASH_MODEL_NAME: ${DFLASH_MODEL_NAME:-dflash}
      DFLASH_MAX_CTX: ${DFLASH_MAX_CTX:-131072}
      DFLASH27B_KV_TQ3: ${DFLASH27B_KV_TQ3:-1}
      DFLASH_GPU_DRAFT_TOPK: ${DFLASH_GPU_DRAFT_TOPK:-1}
      DFLASH_GPU_VERIFY_ARGMAX: ${DFLASH_GPU_VERIFY_ARGMAX:-1}
      DFLASH_DDTREE_BUDGET: ${DFLASH_DDTREE_BUDGET:-22}
      DFLASH27B_DRAFT_CTX_MAX: ${DFLASH27B_DRAFT_CTX_MAX:-4096}
      DFLASH_DRAFT_FEATURE_MIRROR: ${DFLASH_DRAFT_FEATURE_MIRROR:-1}
      DFLASH27B_FA_WINDOW: ${DFLASH27B_FA_WINDOW:-0}
      DFLASH_LAYER_SPLIT: ${DFLASH_LAYER_SPLIT:-1}
      DFLASH_TARGET_DEVICES: ${DFLASH_TARGET_DEVICES:-cuda:0,cuda:1}
      DFLASH_TARGET_LAYER_SPLIT: ${DFLASH_TARGET_LAYER_SPLIT:-32,32}
      DFLASH_TARGET_GPU: ${DFLASH_TARGET_GPU:-0}
      DFLASH_DRAFT_GPU: ${DFLASH_DRAFT_GPU:-1}
      DFLASH_PEER_ACCESS: ${DFLASH_PEER_ACCESS:-1}
      DFLASH_PREFIX_CACHE_SLOTS: ${DFLASH_PREFIX_CACHE_SLOTS:-4}
      DFLASH_PREFILL_MODE: ${DFLASH_PREFILL_MODE:-off}
      DFLASH_PREFILL_DRAFTER: ${DFLASH_PREFILL_DRAFTER:-/opt/lucebox-hub/server/models/qwen3.6-27b-gguf/pflash/Qwen3-0.6B-BF16.gguf}
      DFLASH_PREFILL_THRESHOLD: ${DFLASH_PREFILL_THRESHOLD:-3000}
      DFLASH_PREFILL_KEEP: ${DFLASH_PREFILL_KEEP:-0.10}
      DFLASH_LAZY: ${DFLASH_LAZY:-0}
      DFLASH_PREFILL_CACHE_SLOTS: ${DFLASH_PREFILL_CACHE_SLOTS:-2}
      DFLASH_TOOL_SPLIT_ENABLED: ${DFLASH_TOOL_SPLIT_ENABLED:-0}
      DFLASH_TOOL_SPLIT_PROFILE: ${DFLASH_TOOL_SPLIT_PROFILE:-auto}
      DFLASH_TOOL_SPLIT_PLUGIN_DIR: ${DFLASH_TOOL_SPLIT_PLUGIN_DIR:-}
      DFLASH_TOOL_SPLIT_PINNED_SLOTS: ${DFLASH_TOOL_SPLIT_PINNED_SLOTS:-2}
      DFLASH_TOOL_SPLIT_COMPRESS_CONV: ${DFLASH_TOOL_SPLIT_COMPRESS_CONV:-0}
      DFLASH_DAEMON_LOCK_WAIT_SEC: ${DFLASH_DAEMON_LOCK_WAIT_SEC:-0}
      DFLASH_SCOPED_LOCK_WAIT_SEC: ${DFLASH_SCOPED_LOCK_WAIT_SEC:-180}
      DFLASH_EPHEMERAL_LOCK_WAIT_SEC: ${DFLASH_EPHEMERAL_LOCK_WAIT_SEC:-5}
      DFLASH_SCOPED_LOCK_PRIORITY: ${DFLASH_SCOPED_LOCK_PRIORITY:-1}
      DFLASH_REQUEST_WALL_TIMEOUT_SEC: ${DFLASH_REQUEST_WALL_TIMEOUT_SEC:-600}
      DFLASH_TOOL_SNAPSHOT_MAX_KV: ${DFLASH_TOOL_SNAPSHOT_MAX_KV:-16384}
      DFLASH_QUIET_ACCESS_LOGS: ${DFLASH_QUIET_ACCESS_LOGS:-1}
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: ${GPU_COUNT:-2}
              capabilities: [compute, utility]
    networks:
      ai-inference:
        aliases:
          - engine-v4
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://127.0.0.1:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 600s

networks:
  ai-inference:
    external: true
    name: ai-inference
